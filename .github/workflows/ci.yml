name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, type-check, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies (incl. dev group)
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: Mypy (strict)
        run: uv run mypy src

      - name: Unit tests + coverage
        # pytest-cov is pulled in ephemerally (kept out of the locked deps); the
        # minimum-coverage gate lives in [tool.coverage.report] in pyproject.toml.
        run: uv run --with pytest-cov pytest -m "not integration" --cov=blackbox_ai --cov-report=term-missing

  docker:
    name: Docker build smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: blackbox-ai:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
